name: Release clean-runner

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: clean-runner-linux-x86_64
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            name: clean-runner-macos-x86_64
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            name: clean-runner-macos-aarch64
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: clean-runner-windows-x86_64
            archive: zip

    steps:
    - uses: actions/checkout@v4

    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build
      run: cargo build --release --target ${{ matrix.target }}

    - name: Package (Unix)
      if: matrix.archive == 'tar.gz'
      run: |
        mkdir -p dist
        cp target/${{ matrix.target }}/release/clean-runner dist/
        cd dist && tar -czf ../${{ matrix.name }}.tar.gz clean-runner

    - name: Package (Windows)
      if: matrix.archive == 'zip'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path dist
        Copy-Item "target\${{ matrix.target }}\release\clean-runner.exe" "dist\"
        Compress-Archive -Path "dist\clean-runner.exe" -DestinationPath "${{ matrix.name }}.zip"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.name }}
        path: ${{ matrix.name }}.${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*
        generate_release_notes: true
